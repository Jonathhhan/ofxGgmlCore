name: addon-hygiene

on:
  push:
  pull_request:

jobs:
  hygiene:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify required addon files
        run: |
          test -f addon_config.mk
          test -f README.md
          test -d src
          test -d scripts

      - name: Reject generated/build artifacts
        run: |
          forbidden_patterns=(
            "*.dll"
            "*.so"
            "*.dylib"
            "*.exe"
            "*.gguf"
            "*.bin"
          )

          forbidden_dirs=(
            "build"
            "obj"
            ".vs"
            "bin/data/models"
          )

          failed=0

          for dir in "${forbidden_dirs[@]}"; do
            if find . -path "*/$dir/*" | grep -q .; then
              echo "Forbidden generated directory detected: $dir"
              failed=1
            fi
          done

          for pattern in "${forbidden_patterns[@]}"; do
            if find . -iname "$pattern" | grep -q .; then
              echo "Forbidden artifact detected: $pattern"
              failed=1
            fi
          done

          exit $failed

      - name: Verify AGENTS and Codex skill files
        run: |
          test -f AGENTS.md
          test -f .codex/skills/openframeworks-addon/SKILL.md

      - name: Verify script parity
        run: |
          test -f scripts/validate-local.sh || true
          test -f scripts/validate-local.bat || true

      - name: Ensure addon_config.mk exists
        run: |
          grep -q "ADDON_NAME" addon_config.mk
