name: CI

on:
  push:
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build bundled ggml (CPU-only)
        run: ./scripts/build-ggml.sh --cpu-only

      - name: Script syntax checks
        run: |
          bash -n scripts/*.sh
          bash -n scripts/dev/*.sh

      - name: Validate model catalog JSON
        run: python3 -m json.tool scripts/model-catalog.json > /dev/null

      - name: Validate model catalog checksums, provenance, and signature
        run: |
          python3 scripts/dev/validate-model-catalog.py \
            --require-official-checksums \
            --require-signature \
            scripts/model-catalog.json

      - name: Smoke test model tooling
        run: |
          ./scripts/download-model.sh --list
          ./scripts/dev/benchmark-llama-cli.sh --help

      - name: Build and run unit tests
        run: ./tests/run-tests.sh

  runtime-integration:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build bundled ggml (CPU-only)
        run: ./scripts/build-ggml.sh --cpu-only

      - name: Build tests with runtime sources enabled
        run: |
          cmake -B build/runtime-tests -S tests -DOFXGGML_ENABLE_RUNTIME_SOURCES=ON
          cmake --build build/runtime-tests --config Release

      - name: Run headless CMake test target
        run: ctest --test-dir build/runtime-tests --output-on-failure

  static-analysis:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build bundled ggml (CPU-only)
        run: ./scripts/build-ggml.sh --cpu-only

      - name: Install static analysis tools
        run: |
          sudo apt-get update
          sudo apt-get install -y cppcheck clang-tidy

      - name: Run cppcheck
        run: |
          cppcheck --enable=warning,style,performance,portability \
                   --suppressions-list=.cppcheck-suppressions \
                   --inline-suppr \
                   --template='{file}:{line}:{column}: {severity}: {message} [{id}]' \
                   --quiet \
                   src/ 2> cppcheck-report.txt
          cat cppcheck-report.txt
          grep -E ':[0-9]+:[0-9]+: ' cppcheck-report.txt | sort -u > cppcheck-findings.txt || true
          python3 scripts/dev/check-static-analysis.py \
            --tool cppcheck \
            --findings cppcheck-findings.txt \
            --baseline .ci/static-analysis-baselines/cppcheck-findings.txt \
            --output-new cppcheck-new-findings.txt \
            --output-blocking cppcheck-blocking-findings.txt

      - name: Run clang-tidy on source files
        run: |
          cd tests
          cmake -B build -DCMAKE_EXPORT_COMPILE_COMMANDS=ON
          cd ..

          : > clang-tidy-report.txt
          find src -name "*.cpp" -type f | while read -r file; do
            echo "Analyzing: $file"
            clang-tidy "$file" -- \
              -Ilibs/ggml/include \
              -Isrc \
              -std=c++17 \
              -DGLM_FORCE_CTOR_INIT 2>&1 | tee -a clang-tidy-report.txt || true
          done

          grep -E ':[0-9]+:[0-9]+: (warning|error): .*\[[^]]+\]' clang-tidy-report.txt \
            | sort -u > clang-tidy-findings.txt || true
          python3 scripts/dev/check-static-analysis.py \
            --tool clang-tidy \
            --findings clang-tidy-findings.txt \
            --baseline .ci/static-analysis-baselines/clang-tidy-findings.txt \
            --output-new clang-tidy-new-findings.txt \
            --output-blocking clang-tidy-blocking-findings.txt

      - name: Upload static analysis reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: static-analysis-reports
          path: |
            cppcheck-report.txt
            cppcheck-findings.txt
            cppcheck-new-findings.txt
            cppcheck-blocking-findings.txt
            clang-tidy-report.txt
            clang-tidy-findings.txt
            clang-tidy-new-findings.txt
            clang-tidy-blocking-findings.txt

  performance-regression:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build bundled ggml (CPU-only)
        run: ./scripts/build-ggml.sh --cpu-only

      - name: Build deterministic benchmark binary
        run: |
          cmake -S tests -B build/tests-perf \
            -DCMAKE_BUILD_TYPE=Release \
            -DOFXGGML_ENABLE_RUNTIME_SOURCES=ON \
            -DOFXGGML_ENABLE_BENCHMARK_TESTS=ON
          cmake --build build/tests-perf --config Release

      - name: Check CPU performance profile
        run: |
          python3 scripts/dev/run-performance-profile.py \
            --profile cpu-linux \
            --binary build/tests-perf/ofxGgml-tests

      - name: Check GPU performance profile (skip when unavailable)
        run: |
          python3 scripts/dev/run-performance-profile.py \
            --profile gpu-linux \
            --binary build/tests-perf/ofxGgml-tests

  code-coverage:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install coverage tools
        run: |
          sudo apt-get update
          sudo apt-get install -y lcov

      - name: Build bundled ggml (CPU-only)
        run: ./scripts/build-ggml.sh --cpu-only

      - name: Build tests with coverage instrumentation
        run: |
          cd tests
          cmake -B build -DENABLE_COVERAGE=ON -DCMAKE_BUILD_TYPE=Debug
          cmake --build build

      - name: Run tests
        run: ./tests/build/ofxGgml-tests

      - name: Generate coverage report
        run: |
          lcov --capture \
               --directory tests/build \
               --output-file coverage.info \
               --rc lcov_branch_coverage=1

          lcov --remove coverage.info \
               '/usr/*' \
               '*/tests/*' \
               '*/libs/ggml/*' \
               --output-file coverage_filtered.info \
               --rc lcov_branch_coverage=1

          lcov --list coverage_filtered.info

          genhtml coverage_filtered.info \
                  --output-directory coverage_html \
                  --branch-coverage \
                  --title "ofxGgml Code Coverage"

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage_filtered.info
          flags: unittests
          name: codecov-ofxggml
          fail_ci_if_error: false

      - name: Upload HTML coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage_html/
