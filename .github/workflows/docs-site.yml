name: docs-site

on:
  workflow_dispatch:

jobs:
  docs-site:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify docs portal exists
        run: |
          test -f docs/portal-index.md

      - name: Verify generated docs exist
        run: |
          test -f docs/ecosystem-dashboard.md
          test -f docs/compatibility-matrix.md
          test -f docs/release-plan.md

      - name: Future publishing placeholder
        run: |
          echo "Future GitHub Pages publishing step goes here"
