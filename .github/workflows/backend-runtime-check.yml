name: backend-runtime-check

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/backend-runtime-check.yml
      - scripts/setup-ggml.*
      - scripts/build-runtime-smoke.*
      - scripts/ci-setup-runtime-smoke.sh
      - tools/runtime-smoke/**
      - src/core/**
      - src/compute/**
      - ofxggml-addon.json
  push:
    branches:
      - main
    paths:
      - .github/workflows/backend-runtime-check.yml
      - scripts/setup-ggml.*
      - scripts/build-runtime-smoke.*
      - scripts/ci-setup-runtime-smoke.sh
      - tools/runtime-smoke/**
      - src/core/**
      - src/compute/**
      - ofxggml-addon.json

jobs:
  backend-runtime-check:
    uses: Jonathhhan/ofxGgmlWorkflows/.github/workflows/backend-runtime-check.yml@main
