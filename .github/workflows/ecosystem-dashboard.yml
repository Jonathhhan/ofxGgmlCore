name: ecosystem-dashboard

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  generate-dashboard:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Generate dashboard
        run: |
          python3 scripts/generate-ecosystem-dashboard.py

      - name: Verify generated files exist
        run: |
          test -f docs/ecosystem-dashboard.md
          test -f docs/ecosystem-dependency-graph.md
